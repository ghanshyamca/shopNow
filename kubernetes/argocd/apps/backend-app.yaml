apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: <YOUR-GIT-REPO-URL>  # Replace with your Git repository URL
    targetRevision: <YOUR-BRANCH>   # Replace with your branch
    path: kubernetes/helm/charts/backend
    helm:
      releaseName: backend
      values: |
        image:
          repository: 975050024946.dkr.ecr.ap-south-1.amazonaws.com/shopnow/backend
          tag: latest
        
        config:
          NODE_ENV: production
          PORT: "5000"
          MONGODB_HOST: mongo
        
        secret:
          enabled: true
          MONGODB_URI: mongodb://admin:password123@mongo:27017/shopnow?authSource=admin
        
        hpa:
          enabled: true
  
  destination:
    server: https://kubernetes.default.svc
    namespace: shopnow-demo
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
