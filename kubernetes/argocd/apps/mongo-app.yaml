apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: <YOUR-GIT-REPO-URL>  # Replace with your Git repository URL
    targetRevision: <YOUR-BRANCH>   # Replace with your branch
    path: kubernetes/helm/charts/mongo
    helm:
      releaseName: mongo
      values: |
        replicaCount: 1
        persistence:
          enabled: true
          size: 5Gi
  
  destination:
    server: https://kubernetes.default.svc
    namespace: shopnow-demo
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  # Health check
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
