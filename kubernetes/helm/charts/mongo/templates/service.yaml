apiVersion: v1
kind: Service
metadata:
  name: {{ include "mongo.fullname" . }}-headless
  labels:
    {{- include "mongo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  clusterIP: None
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.port }}
    protocol: TCP
    name: mongo
  selector:
    {{- include "mongo.selectorLabels" . | nindent 4 }}
