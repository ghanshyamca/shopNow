replicaCount: 1

image:
  repository: <ACCOUNT-ID>.dkr.ecr.<REGION>.amazonaws.com/shopnow/backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5000

config:
  MONGODB_HOST: mongo-headless
  MONGODB_PORT: "27017"
  APP_ENV: "k8s-demo"
  PORT: "5000"
  NODE_ENV: "production"

secret:
  enabled: true
  MONGODB_URI: mongodb://admin:ShopNowPass123@mongo-headless:27017/shopnow?authSource=admin
  MONGODB_USERNAME: admin
  MONGODB_PASSWORD: ShopNowPass123

resources:
  requests:
    cpu: "100m"
    memory: "200Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

livenessProbe:
  enabled: true
  path: /api/health
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5

readinessProbe:
  enabled: true
  path: /api/health
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
